- data.train_files=/root/data/libero_rl/train.parquet
- data.val_files=/root/data/libero_rl/test.parquet
- data.train_batch_size=32
- data.val_batch_size=4
- actor_rollout_ref.rollout.n=1
- env.train.num_envs=8
- data.max_prompt_length=256
- data.max_response_length=128
- env.rollout.pipeline_stage_num=2
- env.train.simulator_type=libero
- env.actor.model.num_action_chunks=10
- env.actor.model.action_dim=7
- env.train.only_eval=False
- env.train.max_episode_steps=512
- env.train.video_cfg.save_video=True
- env.train.video_cfg.video_base_dir=/root/video
- env.train.seed=42
- actor_rollout_ref.actor.fsdp_config.model_dtype=bfloat16
- actor_rollout_ref.actor.fsdp_config.wrap_policy.transformer_layer_cls_to_wrap=[SiglipEncoderLayer,GemmaDecoderLayerWithExpert]
- actor_rollout_ref.model.path=/root/data/pi05_libero_torch
- actor_rollout_ref.model.tokenizer_path=/root/data/pi05_libero_torch
- actor_rollout_ref.rollout.mode=async_envloop
- actor_rollout_ref.actor.optim.lr=5e-6
- actor_rollout_ref.actor.optim.warmup_style=constant
- actor_rollout_ref.actor.ppo_mini_batch_size=1024
- actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=8
- actor_rollout_ref.actor.use_dynamic_bsz=False
- actor_rollout_ref.actor.strategy=fsdp2
- critic.strategy=fsdp2
- actor_rollout_ref.actor.grad_clip=1
- actor_rollout_ref.actor.clip_ratio_high=0.28
- actor_rollout_ref.actor.clip_ratio_low=0.2
- actor_rollout_ref.actor.num_images_in_input=1
- actor_rollout_ref.model.enable_gradient_checkpointing=False
- actor_rollout_ref.model.use_remove_padding=False
- actor_rollout_ref.model.trust_remote_code=False
- +actor_rollout_ref.model.override_config.attn_implementation=eager
- actor_rollout_ref.actor.entropy_coeff=0.
- actor_rollout_ref.rollout.temperature=1.6
- actor_rollout_ref.rollout.prompt_length=512
- actor_rollout_ref.rollout.log_prob_micro_batch_size=16
- actor_rollout_ref.rollout.tensor_model_parallel_size=1
- actor_rollout_ref.rollout.name=hf
- actor_rollout_ref.rollout.gpu_memory_utilization=0.9
- actor_rollout_ref.rollout.free_cache_engine=False
- actor_rollout_ref.ref.log_prob_micro_batch_size=16
- actor_rollout_ref.ref.fsdp_config.param_offload=True
- +actor_rollout_ref.algorithm=sac
- algorithm.kl_ctrl.kl_coef=0.00
- trainer.logger=[console]
- trainer.project_name=vla_libero_RL
- trainer.experiment_name=libero_reinforce_plus_plus
- trainer.default_local_dir=/root/models/vla_libero_grpo
- trainer.n_gpus_per_node=4
- +trainer.n_env_gpus_per_node=2
- +trainer.n_rollout_gpus_per_node=2
- +trainer.rollout_interval=20
- trainer.nnodes=1
- trainer.save_freq=300
- trainer.test_freq=-1
- trainer.total_epochs=100
- trainer.val_only=False
- trainer.val_before_train=False
