hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath:
  - file://verl/trainer/config
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.train_files=/root/data/libero_rl/train.parquet
    - data.val_files=/root/data/libero_rl/test.parquet
    - data.train_batch_size=64
    - data.val_batch_size=4
    - actor_rollout_ref.rollout.n=1
    - env.train.num_envs=8
    - data.max_prompt_length=256
    - data.max_response_length=128
    - env.disagg_sim.enable=True
    - env.disagg_sim.nnodes=1
    - env.rollout.pipeline_stage_num=2
    - env.train.simulator_type=isaac
    - env.actor.model.num_action_chunks=10
    - env.actor.model.action_dim=7
    - env.train.only_eval=False
    - env.train.max_episode_steps=512
    - env.train.video_cfg.save_video=True
    - env.train.video_cfg.video_base_dir=/root/video
    - env.train.seed=42
    - actor_rollout_ref.actor.fsdp_config.model_dtype=bfloat16
    - actor_rollout_ref.actor.fsdp_config.wrap_policy.transformer_layer_cls_to_wrap=[SiglipEncoderLayer,GemmaDecoderLayerWithExpert]
    - actor_rollout_ref.model.path=/root/data/pi05_libero_torch
    - actor_rollout_ref.model.tokenizer_path=/root/data/pi05_libero_torch
    - actor_rollout_ref.rollout.mode=async_envloop
    - actor_rollout_ref.actor.optim.lr=5e-6
    - actor_rollout_ref.actor.optim.warmup_style=constant
    - actor_rollout_ref.actor.ppo_mini_batch_size=2048
    - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=32
    - actor_rollout_ref.actor.use_dynamic_bsz=False
    - actor_rollout_ref.actor.strategy=fsdp2
    - critic.strategy=fsdp2
    - actor_rollout_ref.actor.grad_clip=1
    - actor_rollout_ref.actor.clip_ratio_high=0.28
    - actor_rollout_ref.actor.clip_ratio_low=0.2
    - actor_rollout_ref.actor.num_images_in_input=1
    - actor_rollout_ref.model.enable_gradient_checkpointing=False
    - actor_rollout_ref.model.use_remove_padding=False
    - actor_rollout_ref.model.trust_remote_code=False
    - +actor_rollout_ref.model.override_config.attn_implementation=eager
    - actor_rollout_ref.actor.entropy_coeff=0.
    - actor_rollout_ref.rollout.temperature=1.6
    - actor_rollout_ref.rollout.prompt_length=512
    - actor_rollout_ref.rollout.log_prob_micro_batch_size=16
    - actor_rollout_ref.rollout.tensor_model_parallel_size=1
    - actor_rollout_ref.rollout.name=hf
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.9
    - actor_rollout_ref.rollout.free_cache_engine=False
    - actor_rollout_ref.ref.log_prob_micro_batch_size=16
    - actor_rollout_ref.ref.fsdp_config.param_offload=True
    - +actor_rollout_ref.algorithm=sac
    - algorithm.kl_ctrl.kl_coef=0.00
    - trainer.logger=[console]
    - trainer.project_name=pi05-libero-sac
    - trainer.experiment_name=isaac_reinforce_plus_plus
    - trainer.default_local_dir=/root/models/vla_libero_grpo
    - trainer.n_gpus_per_node=8
    - +trainer.n_env_gpus_per_node=4
    - +trainer.n_rollout_gpus_per_node=8
    - +trainer.rollout_interval=20
    - ++env.ray_resource_pool_name=sim_node
    - ++trainer.ray_resource_pool_name=train_node
    - ++env.train.use_wrist_cam=True
    - trainer.nnodes=1
    - trainer.save_freq=300
    - trainer.test_freq=-1
    - trainer.total_epochs=1000
    - trainer.val_only=False
    - algorithm.adv_estimator=reinforce_plus_plus
    - trainer.val_before_train=False
  job:
    name: main_sac
    chdir: null
    override_dirname: ++env.ray_resource_pool_name=sim_node,++env.train.use_wrist_cam=True,++trainer.ray_resource_pool_name=train_node,+actor_rollout_ref.algorithm=sac,+actor_rollout_ref.model.override_config.attn_implementation=eager,+trainer.n_env_gpus_per_node=4,+trainer.n_rollout_gpus_per_node=8,+trainer.rollout_interval=20,actor_rollout_ref.actor.clip_ratio_high=0.28,actor_rollout_ref.actor.clip_ratio_low=0.2,actor_rollout_ref.actor.entropy_coeff=0.,actor_rollout_ref.actor.fsdp_config.model_dtype=bfloat16,actor_rollout_ref.actor.fsdp_config.wrap_policy.transformer_layer_cls_to_wrap=[SiglipEncoderLayer,GemmaDecoderLayerWithExpert],actor_rollout_ref.actor.grad_clip=1,actor_rollout_ref.actor.num_images_in_input=1,actor_rollout_ref.actor.optim.lr=5e-6,actor_rollout_ref.actor.optim.warmup_style=constant,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=32,actor_rollout_ref.actor.ppo_mini_batch_size=2048,actor_rollout_ref.actor.strategy=fsdp2,actor_rollout_ref.actor.use_dynamic_bsz=False,actor_rollout_ref.model.enable_gradient_checkpointing=False,actor_rollout_ref.model.path=/root/data/pi05_libero_torch,actor_rollout_ref.model.tokenizer_path=/root/data/pi05_libero_torch,actor_rollout_ref.model.trust_remote_code=False,actor_rollout_ref.model.use_remove_padding=False,actor_rollout_ref.ref.fsdp_config.param_offload=True,actor_rollout_ref.ref.log_prob_micro_batch_size=16,actor_rollout_ref.rollout.free_cache_engine=False,actor_rollout_ref.rollout.gpu_memory_utilization=0.9,actor_rollout_ref.rollout.log_prob_micro_batch_size=16,actor_rollout_ref.rollout.mode=async_envloop,actor_rollout_ref.rollout.n=1,actor_rollout_ref.rollout.name=hf,actor_rollout_ref.rollout.prompt_length=512,actor_rollout_ref.rollout.temperature=1.6,actor_rollout_ref.rollout.tensor_model_parallel_size=1,algorithm.adv_estimator=reinforce_plus_plus,algorithm.kl_ctrl.kl_coef=0.00,critic.strategy=fsdp2,data.max_prompt_length=256,data.max_response_length=128,data.train_batch_size=64,data.train_files=/root/data/libero_rl/train.parquet,data.val_batch_size=4,data.val_files=/root/data/libero_rl/test.parquet,env.actor.model.action_dim=7,env.actor.model.num_action_chunks=10,env.disagg_sim.enable=True,env.disagg_sim.nnodes=1,env.rollout.pipeline_stage_num=2,env.train.max_episode_steps=512,env.train.num_envs=8,env.train.only_eval=False,env.train.seed=42,env.train.simulator_type=isaac,env.train.video_cfg.save_video=True,env.train.video_cfg.video_base_dir=/root/video,trainer.default_local_dir=/root/models/vla_libero_grpo,trainer.experiment_name=isaac_reinforce_plus_plus,trainer.logger=[console],trainer.n_gpus_per_node=8,trainer.nnodes=1,trainer.project_name=pi05-libero-sac,trainer.save_freq=300,trainer.test_freq=-1,trainer.total_epochs=1000,trainer.val_before_train=False,trainer.val_only=False
    id: ???
    num: ???
    config_name: rob_sac_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /root/code/verl
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /root/code/verl/verl/experimental/vla/config
      schema: file
      provider: main
    - path: verl/trainer/config
      schema: file
      provider: hydra.searchpath in main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /root/code/verl/outputs/2026-03-12/09-21-20
    choices:
      algorithm@algorithm.rollout_correction: rollout_correction
      reward_model: dp_reward_loop
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      data: legacy_data
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
